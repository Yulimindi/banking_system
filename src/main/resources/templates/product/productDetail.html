<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<html xmlns:th="http://www.thymeleaf.org">
<meta charset="UTF-8">
<link rel="stylesheet" th:href="@{/css/header.css}">
<title>Insert title here</title>
</head>

<body>

    <!-- 헤더 -->
    <div th:replace="~{header :: header}"></div>



    <!-- 상품 상단 -->
    <section class="detail-top-section">

        <div class="detail-top-inner">

            <div class="detail-category-wrap">

                <span class="detail-category"
                      th:text="${product.rateCategory}">
                    국내
                </span>

                <span class="detail-type"
                      th:text="${product.productType}">
                    예금
                </span>

            </div>


            <h1 class="detail-product-name"
                th:text="${product.productName}">
                상품명
            </h1>


            <p class="detail-product-desc"
               th:text="${product.productDesc}">
                상품 설명
            </p>

        </div>

    </section>



    <!-- 기본 정보 -->
    <section class="detail-info-section">

        <div class="detail-info-inner">

            <div class="detail-info-box">

                <h3>
                    가입 기간
                </h3>

                <p>
                    <span th:text="${product.minPeriodMonth}"></span>
                    ~
                    <span th:text="${product.maxPeriodMonth}"></span>
                    개월
                </p>

            </div>


            <div class="detail-info-box">

                <h3>
                    가입 금액
                </h3>

                <p>

                    <span th:text="${#numbers.formatInteger(product.minAmount, 3, 'COMMA')}"></span>

                    원 ~

                </p>

            </div>


            <div class="detail-info-box">

                <h3>
                    가입 대상
                </h3>

                <p th:text="${product.targetCustomer}">
                    personal
                </p>

            </div>

        </div>

    </section>



    <!-- 금리 정보 -->
    <section class="rate-section">

        <div class="rate-inner">

            <h2>
                금리 정보
            </h2>

            <table class="rate-table">

                <thead>

                    <tr>

                        <th>
                            통화
                        </th>

                        <th>
                            기간
                        </th>

                        <th>
                            기본금리
                        </th>

                        <th>
                            최고금리
                        </th>

                    </tr>

                </thead>


                <tbody>

                    <tr th:each="rate : ${product.rates}">

                        <td th:text="${rate.currencyCode}">
                            KRW
                        </td>

                        <td>
                            <span th:text="${rate.periodMonth}"></span>
                            개월
                        </td>

                        <td>
                            <span th:text="${rate.baseRate}"></span>
                            %
                        </td>

                        <td>
                            <span th:text="${rate.maxRate}"></span>
                            %
                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </section>



    <!-- 우대금리 -->
    <section class="preferential-section">

        <div class="preferential-inner">

            <h2>
                우대금리 조건
            </h2>

            <div class="preferential-list">

                <div class="preferential-card"
                     th:each="pref : ${product.preferentialRates}">

                    <h3 th:text="${pref.conditionType}">
                        급여이체
                    </h3>

                    <p th:text="${pref.conditionDesc}">
                        조건 설명
                    </p>

                    <span>
                        +
                        <span th:text="${pref.prefRate}"></span>
                        %
                    </span>

                </div>

            </div>

        </div>

    </section>



    <!-- 가입 방법 -->
    <section class="join-section">

        <div class="join-inner">

            <h2>
                가입 방법
            </h2>

            <p th:text="${product.joinMethod}">
                영업점, 인터넷, 스마트폰
            </p>

        </div>

    </section>



    <!-- 유의사항 -->
    <section class="notice-section">

        <div class="notice-inner">

            <h2>
                유의사항
            </h2>

            <p th:text="${product.precautions}">
                유의사항
            </p>

        </div>

    </section>



    <!-- 푸터 -->
    <div th:replace="~{footer :: footer}"></div>

</body>

</html>
