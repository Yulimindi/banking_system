<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login Page</title>
</head>
<body>

<h2>로그인</h2>

<!-- 오류 메시지 -->
<div th:if="${msg != null}" style="color: red;">
    <p th:text="${msg}"></p>
</div>

<form th:action="@{/admin/login}" method="post" th:object="${admin}">

    <div>
        <label>아이디</label>
        <input type="text" th:field="*{login_id}">
    </div>
    <br>
    <div>
        <label>비밀번호</label>
        <input type="password" th:field="*{password}">
    </div>
    <br>
    <button type="submit">로그인</button>

</form>

</body>
</html>
