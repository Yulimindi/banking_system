<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>관리자 로그인</title>
</head>
<body>

<h2>로그인</h2>

<!-- 오류 메시지 (alert 대신 여기에 표시됨) -->
<div id="loginError" style="color: red; display: none;"></div>

<div>
    <label>아이디</label>
    <!-- id명을 login_id로 수정 (AdminDto 필드명과 일치) -->
    <input type="text" id="login_id" placeholder="아이디를 입력하세요">
</div>
<br>
<div>
    <label>비밀번호</label>
    <input type="password" id="password" placeholder="비밀번호를 입력하세요">
</div>
<br>
<!-- form submit 대신 onclick으로 JS 함수 호출 -->
<button type="button" onclick="login()">로그인</button>

<!-- api.js 연결 -->
<script th:src="@{/js/api.js}"></script>
<script>
    // 이미 로그인된 상태면 메인으로 자동 이동
    redirectIfLoggedIn();
</script>

</body>
</html>
