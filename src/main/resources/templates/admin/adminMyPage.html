<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>관리자 마이페이지</title>
</head>
<body>
<h1>마이페이지</h1>

<script src="/js/api.js"></script>
<script>
    // ✅ 보호된 페이지: 토큰 없으면 즉시 차단
    if (!requireLogin()) {
        // requireLogin() 내부에서 이미 redirect 처리됨
    } else {
        loadMyPage();
    }

    async function loadMyPage() {
        const res = await apiFetch("/admin/mypage");
        if (!res) return;

        const data = await res.json();
        console.log(data);
    }
</script>
</body>
</html>
